<!DOCTYPE html>
<html>
<head>
  <title>Trip Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      color: white;
      text-align: center;
      margin: 0;

      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                  url('munnar.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    button {
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      background: #00c853;
      color: white;
      font-size: 18px;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    button:active {
      transform: scale(0.95);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .main-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      padding: 20px 40px;
      width: 80%;
      max-width: 400px;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translate(-50%, 40px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    .step {
      display: none;
      margin-top: 40px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
    }

    .step.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    input, select {
      padding: 15px;
      width: 85%;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
    }

    #beneficiers {
      margin-top: 20px;
      text-align: left;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      font-size: 18px;
    }

    #beneficiers label {
      display: block;
      padding: 10px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    #beneficiers input {
      transform: scale(1.3);
      margin-right: 10px;
    }

    #beneficiers label:has(input:checked) {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<button class="main-btn" onclick="startFlow()">Track Expense</button>

<div id="step1" class="step">
  <h2>Enter Amount</h2>
  <input id="amount" type="number" placeholder="Enter amount">
  <br><br>
  <button onclick="next(2)">Next</button>
</div>

<div id="step2" class="step">
  <h2>Reason</h2>
  <select id="reason">
    <option>Food</option>
    <option>Tea</option>
    <option value="custom">Other</option>
  </select>
  <input id="customReason" placeholder="Enter reason" style="display:none;">
  <br><br>
  <button onclick="next(3)">Next</button>
</div>

<div id="step3" class="step">
  <h2>Location</h2>
  <button onclick="getLocation()">Use Location</button>
  <p id="locationText"></p>
  <br>
  <button onclick="next(4)">Next</button>
</div>

<div id="step4" class="step">
  <h2>Payment Mode</h2>
  <select id="paymentMode">
    <option>Cash</option>
    <option>UPI</option>
    <option>Card</option>
  </select>
  <br><br>
  <button onclick="next(5)">Next</button>
</div>

<div id="step5" class="step">
  <h2>Payer</h2>
  <select id="payer">
    <option>Anbu</option>
    <option>Surya</option>
    <option>Babu</option>
    <option>Selva</option>
    <option>Kumar</option>
    <option>Vicky</option>
  </select>
  <br><br>
  <button onclick="next(6)">Next</button>
</div>

<div id="step6" class="step">
  <h2>Beneficiaries</h2>

  <div id="beneficiers">
    <label><input type="checkbox" value="Anbu"> Anbu</label>
    <label><input type="checkbox" value="Surya"> Surya</label>
    <label><input type="checkbox" value="Babu"> Babu</label>
    <label><input type="checkbox" value="Selva"> Selva</label>
    <label><input type="checkbox" value="Kumar"> Kumar</label>
    <label><input type="checkbox" value="Vicky"> Vicky</label>
  </div>

  <br>
  <button onclick="submitData()">Submit</button>
</div>

<script>
let locationValue = "";

function startFlow() {
  document.querySelector('.main-btn').style.display = "none";

  const step1 = document.getElementById('step1');
  step1.style.display = "block";

  setTimeout(() => {
    step1.classList.add('active');
  }, 10);
}

function next(step) {
  document.querySelectorAll('.step').forEach(s => {
    s.classList.remove('active');
    setTimeout(() => s.style.display = "none", 300);
  });

  const nextStep = document.getElementById('step' + step);
  nextStep.style.display = "block";

  setTimeout(() => {
    nextStep.classList.add('active');
  }, 10);
}

document.getElementById('reason').addEventListener('change', function() {
  document.getElementById('customReason').style.display =
    this.value === 'custom' ? 'block' : 'none';
});

function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    locationValue = pos.coords.latitude + "," + pos.coords.longitude;
    document.getElementById("locationText").innerText = locationValue;
  });
}

function submitData() {
  const amount = document.getElementById('amount').value;

  let reason = document.getElementById('reason').value;
  if (reason === 'custom') {
    reason = document.getElementById('customReason').value;
  }

  const paymentMode = document.getElementById('paymentMode').value;
  const payer = document.getElementById('payer').value;

  const beneficiaries = Array.from(
    document.querySelectorAll('#beneficiers input:checked')
  ).map(cb => cb.value);

  const payload = {
    amount,
    reason,
    location: locationValue,
    paymentMode,
    payer,
    beneficiaries: beneficiaries.join(",")
  };

  fetch("PASTE_YOUR_SCRIPT_URL_HERE", {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(res => res.text())
  .then(data => {
    alert("Saved ✅");
    console.log(data);
    location.reload();
  })
  .catch(err => {
    alert("Error ❌");
    console.error(err);
  });
}
</script>

</body>
</html>
