<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
    }

    button {
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      background: #00c853;
      color: white;
    }

    .main-btn {
      margin-top: 100px;
      font-size: 20px;
      padding: 20px 40px;
    }

    .step {
      display: none;
      margin-top: 40px;
    }

    input, select {
      padding: 12px;
      width: 80%;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <button onclick="alert('Static Mode')">💳 Payment Mode</button>
  <button onclick="alert('Static Users')">👤 Add User</button>
</header>

<button class="main-btn" onclick="startFlow()">Track Expense</button>

<div id="step1" class="step">
  <h2>Enter Amount</h2>
  <input id="amount" type="number">
  <br><br>
  <button onclick="next(2)">Next</button>
</div>

<div id="step2" class="step">
  <h2>Reason</h2>
  <select id="reason">
    <option>Food</option>
    <option>Tea</option>
    <option value="custom">Other</option>
  </select>
  <input id="customReason" placeholder="Enter reason" style="display:none;">
  <br><br>
  <button onclick="next(3)">Next</button>
</div>

<div id="step3" class="step">
  <h2>Location</h2>
  <button onclick="getLocation()">Use Location</button>
  <p id="locationText"></p>
  <br>
  <button onclick="next(4)">Next</button>
</div>

<div id="step4" class="step">
  <h2>Payment Mode</h2>
  <select id="paymentMode">
    <option>Cash</option>
    <option>UPI</option>
    <option>Card</option>
  </select>
  <br><br>
  <button onclick="next(5)">Next</button>
</div>

<div id="step5" class="step">
  <h2>Payer</h2>
  <select id="payer">
    <option>Anbu</option>
    <option>Surya</option>
    <option>Babu</option>
    <option>Selva</option>
    <option>Kumar</option>
    <option>Vicky</option>
  </select>
  <br><br>
  <button onclick="next(6)">Next</button>
</div>

<div id="step6" class="step">
  <h2>Beneficiaries</h2>
  <select id="beneficiers" multiple>
    <option>Anbu</option>
    <option>Surya</option>
    <option>Babu</option>
    <option>Selva</option>
    <option>Kumar</option>
    <option>Vicky</option>
  </select>
  <br><br>
  <button onclick="submitData()">Submit</button>
</div>

<script>
let locationValue = "";

function startFlow() {
  document.querySelector('.main-btn').style.display = "none";
  document.getElementById('step1').style.display = "block";
}

function next(step) {
  document.querySelectorAll('.step').forEach(s => s.style.display = "none");
  document.getElementById('step' + step).style.display = "block";
}

document.getElementById('reason').addEventListener('change', function() {
  document.getElementById('customReason').style.display =
    this.value === 'custom' ? 'block' : 'none';
});

function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    locationValue = pos.coords.latitude + "," + pos.coords.longitude;
    document.getElementById("locationText").innerText = locationValue;
  });
}

function submitData() {
  const amount = document.getElementById('amount').value;

  let reason = document.getElementById('reason').value;
  if (reason === 'custom') {
    reason = document.getElementById('customReason').value;
  }

  const paymentMode = document.getElementById('paymentMode').value;
  const payer = document.getElementById('payer').value;

  const beneficiaries = Array.from(
    document.getElementById('beneficiers').selectedOptions
  ).map(o => o.value);

  const payload = {
    amount,
    reason,
    location: locationValue,
    paymentMode,
    payer,
    beneficiaries: beneficiaries.join(",")
  };

  fetch("PASTE_YOUR_SCRIPT_URL_HERE", {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(() => {
    alert("Saved ✅");
    location.reload();
  });
}
</script>

</body>
</html>
